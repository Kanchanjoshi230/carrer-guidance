<!DOCTYPE html>
<html>
<head>
<title>Career Compass</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#111827;
    position:sticky;
    top:0;
}

.navbar a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

.navbar a:hover{
    color:#38bdf8;
}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px;
    gap:30px;
}

.text-box h1{
    font-size:42px;
    color:#38bdf8;
}

.text-box p{
    font-size:18px;
    color:#cbd5e1;
}

.btn{
    padding:12px 18px;
    margin:10px 5px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}

.primary{
    background:#38bdf8;
    color:black;
}

.secondary{
    background:#1f2937;
    color:white;
    border:1px solid #38bdf8;
}

.image-box img{
    width:350px;
    border-radius:12px;
}

/* CARDS */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:12px;
    width:200px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:#111827;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="navbar">
    <div><b>Career Compass</b></div>

    <div>
        <a href="index.html">Home</a>
        <a href="signup.html">Sign Up</a>
        <a href="login.html">Login</a>
        <a href="about.html">About</a>
        <a href="careers.html">Careers</a>
    </div>
</div>

<div class="hero">

    <div class="text-box">
        <h1>Choose the Right Career Path</h1>
        <p>We help students discover careers, learn skills, and get internships in one place.</p>

        <button class="btn primary" onclick="location.href='signup.html'">
            Get Started
        </button>

        <button class="btn secondary" onclick="location.href='login.html'">
            Login
        </button>
    </div>

    <div class="image-box">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    </div>

</div>

<div class="cards">

    <div class="card">🚀 <h3>Roadmaps</h3><p>Step-by-step career guidance</p></div>
    <div class="card">💼 <h3>Internships</h3><p>Latest opportunities</p></div>
    <div class="card">🎓 <h3>Scholarships</h3><p>Funding chances</p></div>

</div>

<h2 style="text-align:center; margin-top:30px;">Explore Careers</h2>

<div class="gallery">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c">
    <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984">
</div>

</body>
</html>
